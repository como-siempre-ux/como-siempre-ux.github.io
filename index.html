<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shiro — Como_Siempre</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080808;--border:#1e1e1e;--text:#e8e8e8;--muted:#555;
      --accent:#a855f7;--accent2:#ff4d6d;--green:#4ade80;
      --mono:'DM Mono',monospace;--display:'Syne',sans-serif;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:var(--display);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.35;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* HERO */
    .hero{min-height:100vh;display:flex;flex-direction:column;gap:2.5rem;position:relative;overflow:hidden;padding:3rem 1.5rem 2.5rem}
    @media(min-width:700px){.hero{flex-direction:row;align-items:center;padding:4rem 3rem;gap:3rem}}
    .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 80% 20%,rgba(168,85,247,.07) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 5% 85%,rgba(255,77,109,.05) 0%,transparent 60%)}
    .hero-photo{position:relative;z-index:2;flex-shrink:0;align-self:flex-start}
    .hero-photo img{width:min(280px,80vw);height:min(340px,55vw);object-fit:cover;object-position:center 15%;filter:grayscale(20%) contrast(1.05);border:1px solid #222;outline:1px solid rgba(168,85,247,.2);outline-offset:6px;display:block}
    @media(min-width:700px){.hero-photo img{width:280px;height:370px}}
    .hero-text{position:relative;z-index:2;flex:1}
    .tag{font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:1.2rem;animation:fadeUp .8s ease both}
    .tag span{color:var(--accent)}
    .hero-name{font-size:clamp(3.2rem,13vw,9rem);font-weight:800;line-height:.88;letter-spacing:-.03em;animation:fadeUp .8s .1s ease both}
    .hero-name .alt{color:transparent;-webkit-text-stroke:1px rgba(168,85,247,.5)}
    .hero-sub{margin-top:2rem;font-family:var(--mono);font-size:clamp(.7rem,2.5vw,.85rem);color:var(--muted);line-height:1.9;animation:fadeUp .8s .2s ease both}
    .hero-sub strong{color:var(--text)}
    .corner-label{position:absolute;bottom:1.5rem;right:1.5rem;font-family:var(--mono);font-size:.55rem;color:#252525;letter-spacing:.15em}

    .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border) 20%,var(--border) 80%,transparent);margin:0 1.5rem}

    section{padding:4rem 1.5rem;max-width:820px;margin:0 auto}
    .section-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.25em;color:var(--accent);text-transform:uppercase;margin-bottom:2rem;display:flex;align-items:center;gap:1rem}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}

    .bio-text{font-size:clamp(.95rem,2.5vw,1.15rem);line-height:1.8;color:#888;max-width:580px}
    .bio-text strong{color:var(--text)}

    /* SKILLS GRID — 6 cells, 2 cols mobile / 3 cols desktop, fully symmetric */
    .skills-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:1px;
      background:var(--border);
      border:1px solid var(--border);
    }
    @media(min-width:600px){
      .skills-grid{grid-template-columns:repeat(3,1fr)}
    }
    .sk{background:var(--bg);padding:1.4rem 1.1rem;position:relative;overflow:hidden;transition:background .2s}
    .sk::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .3s ease}
    .sk:hover{background:#0d0d0d}
    .sk:hover::before{transform:scaleX(1)}
    .sk-sym{font-family:var(--mono);font-size:.62rem;color:var(--accent);margin-bottom:.6rem;display:block;letter-spacing:.1em}
    .sk-name{font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .sk-desc{font-family:var(--mono);font-size:.62rem;color:var(--muted);margin-top:.3rem;line-height:1.5}

    /* Photo below the grid */
    .skills-photo{
      margin-top:1px;
      border:1px solid var(--border);
      border-top:none;
      overflow:hidden;
    }
    .skills-photo img{
      width:100%;
      max-height:320px;
      object-fit:cover;
      object-position:center 20%;
      display:block;
      filter:grayscale(15%) contrast(1.05);
    }

    /* PROJECTS */
    .projects-grid{display:grid;gap:1px;background:var(--border);border:1px solid var(--border)}
    .project-card{background:var(--bg);padding:1.8rem;display:flex;gap:1.2rem;align-items:flex-start;transition:background .2s}
    .project-card:hover{background:#0c0c0c}
    .project-num{font-family:var(--mono);font-size:.6rem;color:var(--muted);padding-top:.2rem;min-width:2rem}
    .project-content{flex:1}
    .project-title{font-size:.95rem;font-weight:700;letter-spacing:.02em;margin-bottom:.35rem}
    .project-desc{font-family:var(--mono);font-size:.67rem;color:var(--muted);line-height:1.65}
    .project-badge{font-family:var(--mono);font-size:.56rem;letter-spacing:.1em;padding:.2rem .5rem;border:1px solid var(--accent2);color:var(--accent2);text-transform:uppercase;margin-top:.6rem;display:inline-block}
    .project-badge.real{border-color:var(--green);color:var(--green)}
    .disclaimer{font-family:var(--mono);font-size:.62rem;color:#303030;margin-top:1.2rem;padding:.8rem 1rem;border-left:2px solid #181818;line-height:1.7}
    .disclaimer span{color:var(--accent2)}

    /* LINKS */
    .links-row{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}
    @media(min-width:500px){.links-row{grid-template-columns:repeat(4,1fr)}}
    .link-item{background:var(--bg);padding:1.3rem 1rem;text-decoration:none;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:.5rem;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:background .2s,color .2s;text-align:center}
    .link-item:hover{background:var(--accent);color:#fff}
    .link-item svg{width:20px;height:20px}

    footer{padding:2rem 1.5rem;text-align:center;font-family:var(--mono);font-size:.58rem;color:#222;letter-spacing:.15em;border-top:1px solid var(--border)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .cursor{display:inline-block;width:2px;height:.8em;background:var(--accent);margin-left:3px;vertical-align:middle;animation:blink 1s step-end infinite}
    @keyframes blink{50%{opacity:0}}
    .reveal{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
    .reveal.visible{opacity:1;transform:none}
  </style>
</head>
